# ============================================================
# Polybar — Dark Monochrome Theme
# ============================================================

[colors]
background = #0d0d0d
foreground = #c8c8c8
primary    = #ffffff
alert      = #888888
disabled   = #444444

[bar/main]
width  = 100%
height = 24pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt

padding-left  = 1
padding-right = 1

module-margin = 1

separator            = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left   = xworkspaces xwindow
modules-center = target
modules-right  = disk memory cpu network-stat date

cursor-click = pointer
enable-ipc   = true

# ============================================================
# MODULES — Left
# ============================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-foreground = ${colors.primary}
label-active-underline  = ${colors.primary}
label-active-padding    = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.alert}
label-occupied-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding    = 1

[module/xwindow]
type = internal/xwindow
label            = %title:0:40:...%
label-foreground = ${colors.alert}

# ============================================================
# MODULES — Center
# ============================================================

[module/target]
type     = custom/script
exec     = cat ~/.config/polybar/.current_target 2>/dev/null || echo "None"
interval = 2

format-prefix            = "󰓾 "
format-prefix-foreground = ${colors.disabled}
label                    = %output%
label-foreground         = ${colors.foreground}

click-left = echo "None" > ~/.config/polybar/.current_target

# ============================================================
# MODULES — Right
# ============================================================

[module/disk]
type          = internal/fs
interval      = 30
mount-0       = /
format-mounted        = <label-mounted>
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.disabled}
label-mounted = %percentage_used%%

[module/memory]
type     = internal/memory
interval = 2

format-prefix            = "RAM "
format-prefix-foreground = ${colors.disabled}
label                    = %percentage_used:2%%

[module/cpu]
type     = internal/cpu
interval = 2

format-prefix            = "CPU "
format-prefix-foreground = ${colors.disabled}
label                    = %percentage:2%%

[module/network-stat]
type     = custom/script
exec     = ~/.config/polybar/scripts/net_stat.sh
interval = 2

[module/date]
type     = internal/date
interval = 1

date     = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label    = %date%

# ============================================================

[settings]
screenchange-reload = true
pseudo-transparency = true
